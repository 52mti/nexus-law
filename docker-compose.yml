version: '3.8'

services:
  # 1. PostgreSQL 数据库服务
  db:
    image: postgres:15-alpine
    container_name: nexus-law-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_law}
    volumes:
      - postgres_data:/var/lib/postgresql/data # 挂载卷，防止数据库重启丢失数据
    networks:
      - nexus_network

  # 2. NestJS 后端服务
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-law-backend
    restart: always
    depends_on:
      - db
    environment:
      # 内部网络通信，使用 db 作为 host
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-your_password}@db:5432/${POSTGRES_DB:-nexus_law}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      PORT: 3000
    networks:
      - nexus_network

  # 3. React + Nginx 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-law-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "80:80" # 将容器的 80 端口映射到宿主机的 80 端口
    networks:
      - nexus_network

volumes:
  postgres_data: # 声明持久化数据卷

networks:
  nexus_network:
    driver: bridge