version: '3.8'

services:
  # 1. 向量数据库 (PGVector)
  db:
    image: pgvector/pgvector:pg15
    container_name: nexus-law-db
    restart: always
    env_file: 
      - .env  # 读取外层的环境变量
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nexus_net

  # 2. NestJS 后端
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-law-backend
    restart: always
    env_file: 
      - .env
    # ⚠️ 核心覆盖：在 Docker 内部，后端不能用 localhost 连数据库，必须用服务名 db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - nexus_net

  # 3. React 前端
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-law-frontend
    restart: always
    ports:
      - "80:80"  # 暴露给外网的 80 端口 (HTTP)
    depends_on:
      - backend
    networks:
      - nexus_net

# 定义共享网络和持久化数据卷
networks:
  nexus_net:
    driver: bridge
volumes:
  pgdata: