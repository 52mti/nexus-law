server {
    listen 80;

    # 1. 正常访问 React 页面
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 解决 React Router 刷新 404 的问题
        try_files $uri $uri/ /index.html; 
    }

    # ==========================================================
    # 🌟 2. 单独为 AI 流式接口开辟的“绿色长连接通道”（必须放在 /api/ 前面或同级，Nginx会优先匹配最长路径）
    # ==========================================================
    # 🌟 2. 单独为 AI 流式接口开辟的“绿色长连接通道”
    # ==========================================================
    location /agent/api/chat/stream {
        proxy_pass http://backend:3000/api/chat/stream;
        
        # 🚀 核心魔法：彻底关闭 Nginx 缓冲
        proxy_buffering off;
        proxy_cache off;
        
        # 🚀 保持长连接的核心配置
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        
        # 🚀 延长超时时间以应对流式输出
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /agent/api/document/generate {
        proxy_pass http://backend:3000/api/document/generate;
        
        proxy_buffering off;
        proxy_cache off;
        
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================================
    # 3. 拦截兜底：普通 API 请求依然走这里，享受默认的缓冲加速
    # ==========================================================
    location /agent/api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. 代理 /agent 请求到外部 API 服务
    location /agent/ {
        proxy_pass https://api.sh-zktx.com/agent/;
        proxy_set_header Host api.sh-zktx.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }
}