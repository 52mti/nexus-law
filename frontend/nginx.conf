server {
    listen 80;

    # 1. 正常访问 React 页面
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 解决 React Router 刷新 404 的问题
        try_files $uri $uri/ /index.html; 
    }

    # 2. 魔法：把所有 /api 开头的请求，悄悄转发给 NestJS 后端
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. 代理 /agent 请求到外部 API 服务（并使用 proxy_ssl_server_name 处理 HTTPS）
    location /agent/ {
        # 显式补全后方路径，确保 Nginx 做完美对应替换，这不仅保留了 agent 前缀还能防止部分 Nginx 解析器罢工
        proxy_pass https://api.sh-zktx.com/agent/;
        proxy_set_header Host api.sh-zktx.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }
}